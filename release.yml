name: Release

# Запускается при публикации релиза на GitHub (тег вида v0.1.0).
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Подставить версию и ссылки в module.json
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          jq \
            --arg v "$VERSION" \
            --arg url "https://github.com/${REPO}" \
            --arg man "https://github.com/${REPO}/releases/latest/download/module.json" \
            --arg dl "https://github.com/${REPO}/releases/download/${TAG}/module.zip" \
            '.version=$v | .url=$url | .manifest=$man | .download=$dl' \
            module.json > module.tmp.json
          mv module.tmp.json module.json
          echo "module.json:"; cat module.json

      - name: Упаковать module.zip
        run: |
          zip -r module.zip \
            module.json \
            scripts \
            styles \
            README.md \
            LICENSE

      - name: Приложить файлы к релизу
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
